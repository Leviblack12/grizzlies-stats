name: Update GameChanger stats

on:
  schedule:
    - cron: "0 11 * * *"   # ~6:00 AM Central daily
  workflow_dispatch:        # run manually from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Get fresh token and build stats
        env:
          GC_AUTH: ${{ secrets.GC_AUTH }}
        run: |
          # GC_AUTH (content of gc_auth.json) lets us restore the session.
          # xvfb-run provides a virtual display in case GC checks for headless.
          GC_TOKEN="$(xvfb-run --auto-servernum python get_token.py 2>&1 | grep '^ey')"
          export GC_TOKEN
          python run.py

      - name: Commit updated data.json
        run: |
          git config user.name "stats-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          git commit -m "Update stats $(date -u +%F)" || echo "no changes"
          git push
